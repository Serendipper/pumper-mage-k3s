# Pi-hole. Override in config/helm-values/pihole.yaml (gitignored).

# Node to run on (hostname; single node; hostNetwork binds 53/80 on that node's IP).
nodeName: modera

# Timezone for Pi-hole (e.g. America/New_York).
timezone: UTC

# Web admin password. Prefer creating a secret and setting existingSecret (see README).
webPassword: ""

existingSecret: {}  # e.g. { name: pihole-web, key: password }

storageClass: ""
persistenceSize: 1Gi

image:
  repository: pihole/pihole
  tag: "latest"
  pullPolicy: IfNotPresent

upstreamDns: "8.8.8.8;8.8.4.4;1.1.1.1"

# Static dnsmasq lines (init copies to 02-custom-lan.conf on the PVC).
#
# DNS is name → IP only (no ports). Each host gets its own address=/name/ip — no
# CNAME chaining. Ingress apps on dalaran share the control-plane / ingress IP below.
# Browse http://… on port 80; nginx routes by Host (plex-ingress-dalaran.yaml, etc.).
# Direct NAS: address=/truenas… (below).
#
# When the ingress / control-plane LAN IP changes, update every address= line that
# points at that IP — docs/control-plane-ip-change.md.
customDnsmasqLines:
  - "address=/dalaran/192.168.1.6"
  - "address=/dalaran.lan/192.168.1.6"
  - "address=/dalaran.plex/192.168.1.6"
  - "address=/dalaran.radarr/192.168.1.6"
  - "address=/dalaran.sonarr/192.168.1.6"
  - "address=/grafana.lan/192.168.1.6"
  - "address=/openclaw.dalaran.lan/192.168.1.6"
  - "address=/framework12.lan/192.168.1.188"
  - "address=/truenas/192.168.1.200"
  - "address=/truenas.lan/192.168.1.200"
