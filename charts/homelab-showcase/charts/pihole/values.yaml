# Pi-hole. Override in config/helm-values/pihole.yaml (gitignored).

# Node to run on (hostname; single node; hostNetwork binds 53/80 on that node's IP).
nodeName: modera

# Timezone for Pi-hole (e.g. America/New_York).
timezone: UTC

# Web admin password. Prefer creating a secret and setting existingSecret (see README).
webPassword: ""

existingSecret: {}  # e.g. { name: pihole-web, key: password }

storageClass: ""
persistenceSize: 1Gi

image:
  repository: pihole/pihole
  tag: "latest"
  pullPolicy: IfNotPresent

upstreamDns: "8.8.8.8;8.8.4.4;1.1.1.1"

# Static dnsmasq lines (init copies to 02-custom-lan.conf on the PVC).
#
# DNS is name → IP only (no ports). `cname=foo,dalaran.lan` means the same IP as the
# ingress/nginx host. You still browse http://grafana.lan, http://dalaran.plex, etc.
# (port 80); nginx routes by Host header to Plex in-cluster or to TrueNAS for *arr
# (see deploy/kustomize/base/storage/plex-ingress-dalaran.yaml). You do not point
# dalaran.sonarr at truenas in Pi-hole for that flow — the proxy does that.
# For direct NAS UI/SMB, use address=/truenas... (below).
#
# One A record for dalaran; cname apps here so only address=/dalaran.lan/... changes
# when the CP LAN IP changes — docs/control-plane-ip-change.md.
customDnsmasqLines:
  - "address=/dalaran.lan/192.168.1.6"
  - "cname=grafana.lan,dalaran.lan"
  - "cname=openclaw.dalaran.lan,dalaran.lan"
  - "cname=dalaran.plex,dalaran.lan"
  - "cname=dalaran.sonarr,dalaran.lan"
  - "cname=dalaran.radarr,dalaran.lan"
  - "address=/framework12.lan/192.168.1.188"
  - "address=/truenas/192.168.1.200"
  - "address=/truenas.lan/192.168.1.200"
