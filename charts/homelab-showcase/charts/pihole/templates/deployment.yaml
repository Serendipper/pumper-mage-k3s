apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pihole.name" . }}
  labels:
    app.kubernetes.io/name: {{ include "pihole.name" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "pihole.name" . }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: {{ include "pihole.name" . }}
      {{- if .Values.customDnsmasqLines }}
      annotations:
        # Changing customDnsmasqLines must roll the pod: init copies ConfigMap into the PVC-backed dnsmasq.d.
        pihole.custom-dns-hash: {{ .Values.customDnsmasqLines | toYaml | sha256sum | quote }}
      {{- end }}
    spec:
      {{- if .Values.clusterDnsSync.enabled }}
      shareProcessNamespace: true
      serviceAccountName: {{ include "pihole.name" . }}-dns-sync
      {{- end }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: {{ .Values.nodeName }}
      {{- if .Values.customDnsmasqLines }}
      initContainers:
        - name: custom-dns
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cp /config/02-custom-lan.conf /etc/dnsmasq.d/02-custom-lan.conf
              echo "Wrote custom DNS file"
          volumeMounts:
            - name: custom-dns-config
              mountPath: /config
              readOnly: true
            - name: data
              mountPath: /etc/dnsmasq.d
              subPath: dnsmasq.d
      {{- end }}
      containers:
        - name: pihole
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 53
              name: dns-udp
              protocol: UDP
            - containerPort: 53
              name: dns-tcp
              protocol: TCP
            - containerPort: 80
              name: http
          env:
            - name: TZ
              value: {{ .Values.timezone | quote }}
            - name: FTLCONF_dns_upstreams
              value: {{ .Values.upstreamDns | quote }}
            {{- if or .Values.customDnsmasqLines .Values.clusterDnsSync.enabled }}
            - name: FTLCONF_misc_etc_dnsmasq_d
              value: "true"
            {{- end }}
            {{- if .Values.existingSecret.name }}
            - name: WEBPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret.name }}
                  key: {{ .Values.existingSecret.key | default "password" }}
            {{- else if .Values.webPassword }}
            - name: WEBPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pihole.name" . }}-web
                  key: password
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /etc/pihole
            - name: data
              mountPath: /etc/dnsmasq.d
              subPath: dnsmasq.d
          livenessProbe:
            exec:
              command: ["/usr/local/bin/pihole", "status"]
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["/usr/local/bin/pihole", "status"]
            initialDelaySeconds: 30
            periodSeconds: 10
        {{- if .Values.clusterDnsSync.enabled }}
        - name: dns-sync
          image: "{{ .Values.clusterDnsSync.image.repository }}:{{ .Values.clusterDnsSync.image.tag }}"
          imagePullPolicy: {{ .Values.clusterDnsSync.image.pullPolicy }}
          command: ["/bin/sh", "/scripts/sync.sh"]
          env:
            - name: LOCAL_DOMAIN
              value: {{ .Values.clusterDnsSync.localDomain | quote }}
            - name: SYNC_INTERVAL
              value: {{ .Values.clusterDnsSync.intervalSeconds | toString | quote }}
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          volumeMounts:
            - name: data
              mountPath: /etc/dnsmasq.d
              subPath: dnsmasq.d
            - name: dns-sync-script
              mountPath: /scripts
              readOnly: true
          resources:
            {{- toYaml .Values.clusterDnsSync.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "pihole.name" . }}-data
        {{- if .Values.customDnsmasqLines }}
        - name: custom-dns-config
          configMap:
            name: {{ include "pihole.name" . }}-custom-dns
        {{- end }}
        {{- if .Values.clusterDnsSync.enabled }}
        - name: dns-sync-script
          configMap:
            name: {{ include "pihole.name" . }}-dns-sync
            defaultMode: 0755
        {{- end }}
---
# Optional: expose admin UI via a Service (for cluster-internal access; LAN clients use node IP:80)
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pihole.name" . }}-admin
  labels:
    app.kubernetes.io/name: {{ include "pihole.name" . }}
spec:
  type: ClusterIP
  selector:
    app: {{ include "pihole.name" . }}
  ports:
    - port: 80
      targetPort: 80
      name: http
