# ingress-nginx — committed TEMPLATE only. Copy to config/helm-values/ingress-nginx.yaml (see config/README.md).
# Install/upgrade: helm install|upgrade ... -f config/helm-values/ingress-nginx.yaml
# Set controller.nodeSelector to your K3S_CP_HOST (e.g. dalaran) in the live file.
controller:
  hostNetwork: true
  hostPort:
    enabled: true
  kind: DaemonSet
  nodeSelector:
    kubernetes.io/hostname: dalaran
