# OpenClaw gateway on an off-cluster LAN host, fronted by nginx Ingress (HA: HAProxy → CP nodes).
# Inventory: nodes/harmllm-openclaw-gateway.md. Published IP is RFC 5737 TEST-NET — override in deploy/kustomize/live/private/site.yaml.
# DNS: Pi-hole — openclaw.dalaran.lan → modera (HAProxy) when using scripts/apply-haproxy-ingress-lb.sh.
apiVersion: v1
kind: Service
metadata:
  name: openclaw-gateway
  namespace: default
spec:
  ports:
    - name: http
      port: 18789
      targetPort: 18789
---
apiVersion: v1
kind: Endpoints
metadata:
  name: openclaw-gateway
  namespace: default
subsets:
  - addresses:
      - ip: 192.0.2.30
    ports:
      - name: http
        port: 18789
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openclaw
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  ingressClassName: nginx
  rules:
    - host: openclaw.dalaran.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openclaw-gateway
                port:
                  number: 18789
