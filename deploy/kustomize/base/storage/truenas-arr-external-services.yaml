# Sonarr / Radarr on TrueNAS — backends for nginx Ingress (media namespace).
# Published IPs: RFC 5737 TEST-NET — override in deploy/kustomize/live/private/site.yaml for your NAS LAN IP.
# Endpoint ports must match what TrueNAS publishes (adjust if your apps use 8988/7878 etc.).
apiVersion: v1
kind: Service
metadata:
  name: sonarr-truenas
  namespace: media
spec:
  ports:
    - name: http
      port: 30113
      targetPort: 30113
---
apiVersion: v1
kind: Endpoints
metadata:
  name: sonarr-truenas
  namespace: media
subsets:
  - addresses:
      - ip: 192.0.2.20
    ports:
      - name: http
        port: 30113
---
apiVersion: v1
kind: Service
metadata:
  name: radarr-truenas
  namespace: media
spec:
  ports:
    - name: http
      port: 30025
      targetPort: 30025
---
apiVersion: v1
kind: Endpoints
metadata:
  name: radarr-truenas
  namespace: media
subsets:
  - addresses:
      - ip: 192.0.2.20
    ports:
      - name: http
        port: 30025
