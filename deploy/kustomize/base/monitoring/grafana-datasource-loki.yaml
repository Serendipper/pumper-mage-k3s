# Fallback ConfigMap — committed template. Prefer additionalDataSources in config/helm-values/prometheus-stack.yaml.
# If you use this manifest, keep a private copy or gitignored variant; do not commit real cluster-specific edits.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-loki
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  loki.yaml: |-
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        uid: loki
        url: http://loki-gateway
        access: proxy
        jsonData:
          httpHeaderName1: "X-Scope-OrgID"
          httpHeaderValue1: "1"
