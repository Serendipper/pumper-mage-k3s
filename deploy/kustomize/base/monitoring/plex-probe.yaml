apiVersion: v1
kind: ConfigMap
metadata:
  name: blackbox-exporter-config
  namespace: monitoring
data:
  blackbox.yml: |
    modules:
      http_plex_via_dalaran:
        prober: http
        timeout: 5s
        http:
          method: GET
          headers:
            Host: dalaran.plex
          preferred_ip_protocol: ip4
          valid_status_codes: [200, 301, 302, 401]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blackbox-exporter
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blackbox-exporter
  template:
    metadata:
      labels:
        app: blackbox-exporter
    spec:
      containers:
        - name: blackbox-exporter
          image: quay.io/prometheus/blackbox-exporter:v0.25.0
          args:
            - --config.file=/etc/blackbox/blackbox.yml
          ports:
            - name: http
              containerPort: 9115
          volumeMounts:
            - name: config
              mountPath: /etc/blackbox
      volumes:
        - name: config
          configMap:
            name: blackbox-exporter-config
---
apiVersion: v1
kind: Service
metadata:
  name: blackbox-exporter
  namespace: monitoring
spec:
  selector:
    app: blackbox-exporter
  ports:
    - name: http
      port: 9115
      targetPort: http
---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: plex-via-dalaran
  namespace: monitoring
  labels:
    release: prometheus-stack
spec:
  interval: 30s
  module: http_plex_via_dalaran
  prober:
    path: /probe
    scheme: http
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - http://198.51.100.5/
