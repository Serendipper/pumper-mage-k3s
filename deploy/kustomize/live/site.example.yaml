# Copy to deploy/kustomize/live/private/site.yaml (gitignored). LAN overrides for Endpoints + Plex Probe.
# IPs below match deploy/kustomize/base placeholders until you replace them with real values.
---
apiVersion: v1
kind: Endpoints
metadata:
  name: openclaw-gateway
  namespace: default
subsets:
  - addresses:
      - ip: 192.0.2.30
    ports:
      - name: http
        port: 18789
---
apiVersion: v1
kind: Endpoints
metadata:
  name: sonarr-truenas
  namespace: media
subsets:
  - addresses:
      - ip: 192.0.2.20
    ports:
      - name: http
        port: 30113
---
apiVersion: v1
kind: Endpoints
metadata:
  name: radarr-truenas
  namespace: media
subsets:
  - addresses:
      - ip: 192.0.2.20
    ports:
      - name: http
        port: 30025
---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: plex-via-dalaran
  namespace: monitoring
spec:
  targets:
    staticConfig:
      static:
        - http://198.51.100.5/
