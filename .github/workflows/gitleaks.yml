# Secret scan on push/PR. Uses .gitleaks.toml at repo root.
# (Upstream gitleaks-action v2 can require a license for org-owned repos; this workflow only downloads the OSS CLI.)
name: gitleaks
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  GITLEAKS_VERSION: "8.30.0"

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz -C /tmp
          sudo install -m755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan
        run: gitleaks git --verbose --redact
