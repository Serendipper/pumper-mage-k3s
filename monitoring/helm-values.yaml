# kube-prometheus-stack — committed TEMPLATE only (no real secrets).
# Copy to config/helm-values/prometheus-stack.yaml and edit there (see config/README.md).
# Install: monitoring/README.md, skills/monitoring-stack-setup/SKILL.md

grafana:
  enabled: true
  adminUser: admin
  adminPassword: OVERRIDE_AT_INSTALL
  # Pin to control plane so image pull works (some workers have flaky registry access)
  nodeSelector:
    kubernetes.io/hostname: dalaran

  persistence:
    enabled: true
    type: pvc
    storageClassName: local-path
    size: 10Gi
    accessModes:
      - ReadWriteOnce

  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      url: http://loki-gateway
      access: proxy
      isDefault: false
      jsonData:
        httpHeaderName1: "X-Scope-OrgID"
        httpHeaderValue1: "1"

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.lan
    path: /

# Prometheus retention and persistence (local-path on dalaran); pin to CP so image pull works
prometheus:
  prometheusSpec:
    nodeSelector:
      kubernetes.io/hostname: dalaran
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
