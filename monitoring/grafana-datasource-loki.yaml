# Fallback: provision Loki datasource via ConfigMap only if not using the stack's additionalDataSources.
# Primary: Loki is provisioned from monitoring/helm-values.yaml (additionalDataSources). After changing
# that file, run: helm upgrade prometheus-stack ... -f monitoring/helm-values.yaml && kubectl rollout restart deployment -n monitoring prometheus-stack-grafana
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-loki
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  loki.yaml: |-
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        uid: loki
        url: http://loki-gateway
        access: proxy
        jsonData:
          httpHeaderName1: "X-Scope-OrgID"
          httpHeaderValue1: "1"
