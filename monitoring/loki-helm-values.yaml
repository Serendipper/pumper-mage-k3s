# Loki — committed TEMPLATE only. Copy to config/helm-values/loki.yaml (see config/README.md).
# Install: helm install loki grafana/loki -n monitoring -f config/helm-values/loki.yaml
# Requires: helm repo add grafana https://grafana.github.io/helm-charts

loki:
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  pattern_ingester:
    enabled: true
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
  ruler:
    enable_api: true

minio:
  enabled: true
  persistence:
    storageClass: local-path
  # No nodeSelector: let MinIO run where its PVCs bound (avoids Pending when PVC is on another node)

# Pin gateway to control plane so image pull succeeds
gateway:
  nodeSelector:
    kubernetes.io/hostname: dalaran

# Canary is optional; disable to avoid ImagePullBackOff on workers
canary:
  enabled: false

# Pin caches to control plane so memcached images pull
chunksCache:
  nodeSelector:
    kubernetes.io/hostname: dalaran
resultsCache:
  nodeSelector:
    kubernetes.io/hostname: dalaran

deploymentMode: SingleBinary
singleBinary:
  replicas: 1
  persistence:
    storageClass: local-path
    size: 30Gi
  nodeSelector:
    kubernetes.io/hostname: dalaran

# Zero out other modes
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0
