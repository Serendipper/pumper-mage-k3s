# Promtail — committed TEMPLATE only. Copy to config/helm-values/promtail.yaml (see config/README.md).
# Install: helm install promtail grafana/promtail -n monitoring -f config/helm-values/promtail.yaml

config:
  lokiAddress: http://loki-gateway/loki/api/v1/push

# Run only on control plane to avoid ImagePullBackOff on workers (you still get CP + any pods on dalaran)
nodeSelector:
  kubernetes.io/hostname: dalaran
tolerations: []
# Persist positions so restarts don't re-send old logs
persistence:
  enabled: true
  storageClass: local-path
  size: 1Gi
